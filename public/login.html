<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login KSP ANKOP</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/magic-nav.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- NAVBAR ATAS (Dark Mode Toggle) -->
    <div class="navbar" style="justify-content: flex-end;">
        <div class="theme-toggle-wrapper">
            <label class="theme-toggle">
                <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
                <span class="slider">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </span>
            </label>
        </div>
    </div>

    <div class="container">
        <div class="card" style="max-width: 450px; margin: 40px auto;">
            <div class="header-info">
                <h2 style="margin-bottom: 5px;">KOPERASI SIMPAN PINJAM ANKOP</h2>
                AHU: ANKOPRI2002 NIB: ANKOP15062002 OJK: Terdaftar<br>
                Alamat: Simpang SKPD, Riau | Telp: 6281934874758
            </div>
            
            <h3 style="text-align:center; margin-bottom: 20px;">Masuk Akun</h3>
            
            <div id="loginForm">
                <label>Input Email Anda</label>
                <input type="email" id="emailInput" placeholder="Masukkan email Anda" style="margin-bottom: 15px;">
                
                <button class="btn btn-green" style="width:100%; padding: 12px;" id="loginBtn" onclick="loginWithEmail()">
                    <i class="fa-solid fa-paper-plane"></i> Kirim Link Login
                </button>
                
                <p id="statusMsg" style="font-size: 13px; text-align: center; margin-top: 20px; color: var(--primary); font-weight: bold; display: none;"></p>
                <p id="errorMsg" style="color: var(--secondary); font-size: 12px; text-align: center; display: none;"></p>
            </div>

            <p style="font-size: 12px; text-align: center; margin-top: 20px; border-top: 1px solid var(--md-sys-color-outline-variant); padding-top: 15px;">
                * Kami akan mengirimkan tautan masuk ke email Anda.<br>
                * Cukup klik tautan tersebut untuk masuk secara otomatis.
            </p>
        </div>
    </div>

    <!-- MAGIC NAVBAR BAWAH -->
    <div class="magic-nav-wrapper">
      <nav class="magic-navigation">
        <ul></ul>
      </nav>
    </div>

    <script>
        let supabase = null;

        // === KONFIGURASI SUPABASE VIA BACKEND (AMAN) ===
        async function initializeSupabase() {
            try {
                const response = await fetch('/api/env-config');
                const config = await response.json();
                
                if (!config.supabaseUrl || !config.supabaseKey) {
                    document.getElementById('errorMsg').innerText = "Gagal terhubung ke server.";
                    document.getElementById('errorMsg').style.display = 'block';
                    return;
                }

                supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseKey);

                // Cek sesi yang sudah ada (Jika user sudah login tapi buka /login lagi)
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    redirectBasedOnRole(session.user.email);
                }
                
                // Listener untuk mendeteksi jika user klik link Magic Link dari emailnya
                supabase.auth.onAuthStateChange((event, session) => {
                    if (session) {
                        redirectBasedOnRole(session.user.email);
                    }
                });
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function redirectBasedOnRole(email) {
            if (email === 'andrizalhacieboan@gmail.com') {
                window.location.href = '/admin';
            } else {
                window.location.href = '/';
            }
        }

        // === FUNGSI LOGIN HANYA DENGAN EMAIL (MAGIC LINK SMTP) ===
        async function loginWithEmail() {
            const email = document.getElementById('emailInput').value.trim();
            const errBox = document.getElementById('errorMsg');
            const statusBox = document.getElementById('statusMsg');
            const btn = document.getElementById('loginBtn');
            
            errBox.style.display = 'none';
            statusBox.style.display = 'none';

            if (!email) {
                errBox.innerText = "Email wajib diisi!";
                errBox.style.display = 'block';
                return;
            }

            // Ubah teks tombol jadi loading
            btn.innerText = "Mengirim link...";
            btn.disabled = true;

            // Kirim Magic Link ke email menggunakan SMTP Supabase
            const { error } = await supabase.auth.signInWithOtp({
                email: email,
                options: {
                    emailRedirectTo: window.location.origin // Arahkan kembali ke web ini setelah klik link
                }
            });

            if (error) {
                errBox.innerText = "Gagal: " + error.message;
                errBox.style.display = 'block';
                btn.innerText = "Kirim Link Login";
                btn.disabled = false;
            } else {
                statusBox.innerText = "✅ Link login telah dikirim ke " + email + ". Cek kotak masuk/spam Anda.";
                statusBox.style.display = 'block';
                btn.innerText = "Kirim Ulang Link";
                btn.disabled = false;
            }
        }

        // === DARK MODE ===
        function applyDarkModePreference() {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeToggle').checked = true;
            }
        }
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        applyDarkModePreference();

        // Jalankan inisialisasi
        initializeSupabase();
    </script>
</body>
</html>
