<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login KSP ANKOP</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/magic-nav.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- NAVBAR ATAS -->
    <div class="navbar" style="justify-content: flex-end;">
        <div class="theme-toggle-wrapper">
            <label class="theme-toggle">
                <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
                <span class="slider">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </span>
            </label>
        </div>
    </div>

    <div class="container">
        <div class="card" style="max-width: 450px; margin: 40px auto;">
            <div class="header-info">
                <h2 style="margin-bottom: 5px;">KOPERASI SIMPAN PINJAM ANKOP</h2>
                AHU: ANKOP15062002 NIB: KSPASKOP20020615 OJK: Terdaftar<br>
                Alamat: Simpang SKPF, Riau | Telp: 6281934874758
            </div>
            
            <h3 style="text-align:center; margin-bottom: 20px;">Masuk Akun</h3>
            
            <div id="loginForm">
                <label>Email</label>
                <input type="email" id="emailInput" placeholder="Masukkan email (Admin/Anggota)">
                
                <label>Password</label>
                <input type="password" id="passwordInput" placeholder="Masukkan password">
                
                <button class="btn btn-green" style="width:100%; margin-top: 10px;" id="loginBtn" onclick="loginWithEmail()">
                    Login
                </button>
                <button class="btn btn-blue" style="width:100%; margin-top: 10px; background: #DB4437;" onclick="loginWithGoogle()">
                    <i class="fa-brands fa-google"></i> Login dengan Google
                </button>
                <p style="font-size: 12px; text-align: center; margin-top: 15px; color: var(--md-sys-color-on-surface-variant);">
                    Belum punya akun? <a href="#" onclick="signUp()" style="color: var(--primary); font-weight: bold;">Daftar di sini</a>
                </p>
                <p id="errorMsg" style="color: red; font-size: 12px; text-align: center; display: none;"></p>
            </div>

            <p style="font-size: 12px; text-align: center; margin-top: 15px; border-top: 1px solid var(--md-sys-color-outline-variant); padding-top: 15px;">
                Terima kasih telah bergabung dengan KSP ANKOP
            </p>
        </div>
    </div>

    <!-- MAGIC NAVBAR BAWAH -->
    <div class="magic-nav-wrapper">
      <nav class="magic-navigation">
        <ul></ul>
      </nav>
    </div>

    <script>
        let supabase = null;

        async function initializeSupabase() {
            try {
                const response = await fetch('/api/env-config');
                const config = await response.json();
                if (!config.supabaseUrl || !config.supabaseKey) return;

                supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseKey);

                // Cek sesi yang sudah ada
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    redirectBasedOnRole(session.user.email);
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function redirectBasedOnRole(email) {
            if (email === 'andrizalhacieboan@gmail.com') {
                window.location.href = '/admin';
            } else {
                window.location.href = '/';
            }
        }

        async function loginWithEmail() {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const errBox = document.getElementById('errorMsg');
            errBox.style.display = 'none';

            if (!email || !password) {
                errBox.innerText = "Email dan password wajib diisi!";
                errBox.style.display = 'block';
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                errBox.innerText = "Login gagal: " + error.message;
                errBox.style.display = 'block';
            } else {
                redirectBasedOnRole(data.user.email);
            }
        }

        async function signUp() {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const errBox = document.getElementById('errorMsg');
            errBox.style.display = 'none';

            if (!email || !password) {
                errBox.innerText = "Email dan password wajib diisi untuk daftar!";
                errBox.style.display = 'block';
                return;
            }

            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) {
                errBox.innerText = "Gagal daftar: " + error.message;
                errBox.style.display = 'block';
            } else {
                alert("Pendaftaran berhasil! Silakan login.");
            }
        }

        async function loginWithGoogle() {
            if (!supabase) return alert("Sistem masih memuat.");
            await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
        }

        // Dark Mode
        function applyDarkModePreference() {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeToggle').checked = true;
            }
        }
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        applyDarkModePreference();

        initializeSupabase();
    </script>
</body>
</html>
