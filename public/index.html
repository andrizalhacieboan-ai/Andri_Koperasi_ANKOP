<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Anggota - KSP ANKOP</title>
    <!-- CSS Utama & FontAwesome untuk Ikon Navbar -->
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Script Navbar & Supabase -->
    <script src="/magic-nav.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- NAVBAR ATAS -->
    <div class="navbar">
        <div>
            Halo, <strong id="userName">Peminjam</strong> 
            <span style="font-size:12px; background:white; color:var(--primary); padding:2px 5px; border-radius:5px; margin-left:10px; cursor:pointer;" onclick="hubungiCS()">Bantuan</span>
        </div>
        
        <div style="display: flex; align-items: center;">
            <!-- TOGGLE DARK MODE -->
            <div class="theme-toggle-wrapper">
                <label class="theme-toggle">
                    <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
                    <span class="slider">
                        <span class="icon-sun">☀️</span>
                        <span class="icon-moon">🌙</span>
                    </span>
                </label>
            </div>

            <button class="btn btn-red" style="padding: 5px 10px; margin-left: 15px;" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- KONTEN DASHBOARD -->
    <div class="container">
        <!-- Baris 2: Kartu Hijau Simpanan -->
        <div class="card" style="background:var(--primary); color:white;">
            <h4>Total Simpanan Anda</h4>
            <h1 id="totalSimpanan">Rp 0</h1>
            <button class="btn" style="background:white; color:var(--primary); margin-top:10px;" onclick="alert('Fitur rincian simpanan sedang dalam pengembangan.')">Lihat Rincian</button>
        </div>

        <!-- Baris 3: Kartu Merah Muda Pinjaman -->
        <div class="card" style="background:#FFC0CB; color:#8B0000;">
            <h4>Sisa Pinjaman</h4>
            <h1 id="sisaPinjaman">Rp 0</h1>
            <div style="background:white; border-radius:5px; height:10px; width:100%; margin-top:10px;">
                <div id="progressBar" style="background:var(--secondary); height:100%; width:0%; border-radius:5px; transition: width 0.5s;"></div>
            </div>
            <small id="progressText">0% Terlunasi</small>
        </div>

        <!-- Baris 4: Menu Cepat -->
        <div class="grid-2" style="grid-template-columns: repeat(4, 1fr); margin-bottom: 20px;">
            <button class="btn btn-green" onclick="window.location.href='/simulasi.html'">Bayar Angsuran</button>
            <button class="btn btn-green" onclick="alert('Halaman Setor Tunai')">Setor Tunai</button>
            <button class="btn btn-blue" onclick="window.location.href='/simulasi.html'">Ajukan Pinjaman</button>
            <button class="btn btn-blue" onclick="hubungiCS()">Hubungi CS</button>
        </div>

        <!-- Baris 5: List Tagihan -->
        <div class="card">
            <h3>Tagihan Aktif</h3>
            <div style="border-left: 4px solid var(--secondary); padding-left:10px; margin-top:10px;">
                <strong>Bulan November 2025</strong><br>
                Jatuh Tempo: 12 November 2025<br>
                Nominal: <strong>Rp1.120.000</strong>
                <button class="btn btn-red" style="float:right;" onclick="bayarSekarang()">Bayar Sekarang</button>
            </div>
        </div>

        <!-- Baris 6: Riwayat -->
        <div class="card">
            <h3>Riwayat Transaksi</h3>
            <ul style="list-style:none; padding:0;">
                <li style="padding:10px; border-bottom:1px solid var(--md-sys-color-outline-variant); display:flex; justify-content:space-between;">
                    <span>Setor Sukarela</span> <span style="color:green">+ Rp50.000</span>
                </li>
                <li style="padding:10px; display:flex; justify-content:space-between;">
                    <span>Bayar Angsuran Okt</span> <span style="color:red">- Rp1.120.000</span>
                </li>
            </ul>
        </div>
    </div>

    <!-- MAGIC NAVBAR BAWAH -->
    <div class="magic-nav-wrapper">
      <nav class="magic-navigation">
        <ul><!-- Menu dirender otomatis oleh magic-nav.js --></ul>
      </nav>
    </div>

    <script>
        // === KONFIGURASI SUPABASE ===
        const SUPABASE_URL = 'URL_SUPABASE_KAMU'; // Ganti dengan URL Anda
        const SUPABASE_KEY = 'ANON_KEY_SUPABASE_KAMU'; // Ganti dengan Key Anda
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // === SCRIPT DARK MODE ===
        function applyDarkModePreference() {
            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
                const toggle = document.getElementById('darkModeToggle');
                if(toggle) toggle.checked = true;
            }
        }
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDarkMode);
        }
        applyDarkModePreference();

        // === FUNGSI AKSI TOMBOL ===
        function logout() {
            supabase.auth.signOut();
            localStorage.clear();
            window.location.href = '/login';
        }

        function hubungiCS() {
            // Nomor CS dari SOP: 6281934874758
            window.open('https://wa.me/6281934874758?text=Halo%20Admin%20ANKOP,%20saya%20butuh%20bantuan', '_blank');
        }

        function bayarSekarang() {
            const yakin = confirm("Anda akan membayar tagihan Rp1.120.000. Lanjutkan?");
            if (yakin) {
                alert("Pembayaran berhasil diproses (Simulasi Kasir).");
                // Update UI secara lokal
                document.getElementById("progressBar").style.width = "40%";
                document.getElementById("progressText").innerText = "40% Terlunasi";
            }
        }

        // === CEK LOGIN & AMBIL DATA ===
        async function loadUserData() {
            const { data: { session }, error } = await supabase.auth.getSession();
            
            if (!session) {
                window.location.href = '/login';
                return;
            }

            // Tampilkan email/nama pengguna
            const email = session.user.email;
            document.getElementById('userName').innerText = email.split('@')[0]; // Ambil nama depan email
            
            // Cek jika admin yang login, tendang ke /admin
            if (email === 'andrizalhacieboan@gmail.com') {
                window.location.href = '/admin';
            }

            // === AMBIL DATA DARI DATABASE (CONTOH) ===
            // Anda bisa aktifkan ini jika tabel di Supabase sudah berisi data
            
            const { data: simpanan } = await supabase.from('simpanan').select('jumlah').eq('user_id', session.user.id);
            if (simpanan && simpanan.length > 0) {
                const total = simpanan.reduce((sum, item) => sum + item.jumlah, 0);
                document.getElementById('totalSimpanan').innerText = 'Rp ' + total.toLocaleString('id-ID');
            }
            
        }

        // Panggil saat halaman dibuka
        loadUserData();
    </script>
</body>
</html>
